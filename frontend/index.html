map(([v,i,t])=>`<button data-v="${v}" onclick="show('${v}')">${i}<span>${t}</span>${v==='lavado'?'<span class="badge">OC</span>':''}</button>`).join('')}function show(v){document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));$(v).classList.add('active');document.querySelectorAll('.menu button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));renderView(v)}function row(r){return `<tr><td><b>${r.id}</b></td><td>${r.fecha}</td><td><b>${r.cliente}</b></td><td>${tagA(r.area)}</td><td>${r.sucursal||'—'}</td><td>${r.tipo}</td><td>${r.personal||'—'}</td><td>${tagE(r.estado)}</td><td><b>${money(r.neto)}</b></td><td>${money(r.costo)}</td><td><b>${mrg(r)}${mrg(r)==='—'?'':'%'}</b></td><td>${r.evidencia}</td><td><button class="btn sec" onclick="openFolder('${r.carpeta}')">📁 ${r.carpeta}</button></td><td><button class="btn sec" onclick="openForm('${r.id}')">Editar</button></td></tr>`}function table(a){return `<div class="tablewrap"><table><thead><tr><th>ID</th><th>Fecha</th><th>Cliente</th><th>Área</th><th>Sucursal</th><th>Tipo</th><th>Personal</th><th>Estado</th><th>Neto</th><th>Costo</th><th>MRG</th><th>Evid.</th><th>Carpeta</th><th></th></tr></thead><tbody>${a.map(row).join('')}</tbody></table></div>`}function dashboard(){let r=state.registros,net=sum(r,'neto'),cost=sum(r,'costo');return `<div class="title"><div><h2>Resumen Operativo HNF</h2><p>Cada registro queda separado por negocio y carpeta.</p></div><button class="btn" onclick="openForm()">+ Nuevo Registro</button></div><div class="grid kpis">${AREAS.map(a=>{let ar=r.filter(x=>x.area===a),v=a==='Obras Civiles'?'obras':a.toLowerCase(),ic=a==='Flota'?'🚙':a==='Clima'?'❄️':a==='Lavado'?'🫧':'🏗️';return `<div class="kpi" onclick="show('${v}')"><div class="ic">${ic}</div><small>${a}</small><strong>${ar.length}</strong><span>${money(sum(ar,'neto'))} · ${AREA_C[a]}</span></div>`}).join('')}</div><div class="money"><div><small>Facturable neto</small><strong>${money(net)}</strong></div><div><small>Costo neto</small><strong>${money(cost)}</strong></div><div><small>Margen $</small><strong class="green">${money(net-cost)}</strong></div><div><small>Pendiente OC Lavado</small><strong class="green">${money(sum(r.filter(x=>x.area==='Lavado'),'neto'))}</strong></div></div><div class="layout"><div class="panel"><h3>Operaciones separadas</h3>${table(r)}</div><aside class="panel"><h3>Regla activa</h3><div class="notice good"><b>Nada se mezcla.</b><br>Flota: Grandleasing, Autotattersall, West.<br>Clima: Puma.<br>Obras Civiles: Tattersall Casa Matriz.<br>Lavado: Tattersall Sixt.</div><button class="btn" onclick="fixAreas()">Reordenar registros</button></aside></div>`}function listView(area,title){let arr=area?state.registros.filter(r=>r.area===area):state.registros;return `<div class="title"><div><h2>${title}</h2><p>${arr.length} registros · Neto ${money(sum(arr,'neto'))} · Carpeta ${AREA_C[area]||'todas'}</p></div><button class="btn" onclick="openForm(null,'${area||''}')">+ Nuevo Registro</button></div><div class="filters"><input id="q" placeholder="Buscar ID, cliente..." oninput="filter('${area||''}')"><select id="e" onchange="filter('${area||''}')"><option value="">Todos los estados</option><option>Pendiente OC</option><option>Trabajos realizados - Pendiente OC</option><option>OT enviada</option><option>En cotización</option></select></div><div class="panel" id="tbl">${table(arr)}</div>`}function filter(area){let q=$('q').value.toLowerCase(),e=$('e').value;let arr=state.registros.filter(r=>(!area||r.area===area)&&(!e||String(r.estado).includes(e))&&(!q||JSON.stringify(r).toLowerCase().includes(q)));$('tbl').innerHTML=table(arr)}function ppto(){let r=state.registros.find(x=>x.id==='P-220')||state.registros[0];return `<div class="title"><div><h2>Presupuestos</h2><p>Presupuestos técnicos. No mezcla con Lavado.</p></div><button class="btn" onclick="window.print()">Imprimir / PDF</button></div>${doc(r,'PRESUPUESTO TÉCNICO COMERCIAL')}`}function ot(){let arr=state.registros.filter(r=>r.ot&&r.ot!=='No');return `<div class="title"><div><h2>OT / Informe</h2><p>OT desde su negocio.</p></div><button class="btn" onclick="window.print()">Imprimir / PDF</button></div>${doc(arr[0]||state.registros[0],'ORDEN DE TRABAJO')}<div class="panel" style="margin-top:18px"><h3>Registros para OT</h3>${table(arr)}</div>`}function doc(r,t){return `<div class="doc"><div class="dochead"><div><h2>HNF · ${t}</h2><p>Control Diario 2026</p></div><div><b>N° ${r.id}</b><br>${r.fecha}</div></div><div class="docbody"><div class="box"><b>Cliente:</b> ${r.cliente}<br><b>Área:</b> ${r.area}<br><b>Sucursal:</b> ${r.sucursal||'—'}<br><b>Responsable:</b> ${r.responsable}</div><div class="box"><h3>Servicio</h3><p>${r.descripcion}</p></div><table><thead><tr><th>Descripción</th><th>Total neto</th></tr></thead><tbody><tr><td>${r.tipo}</td><td>${money(r.neto)}</td></tr></tbody></table><div class="box"><b>Evidencia:</b> ${r.evidencia} · <b>Carpeta:</b> ${r.carpeta}</div></div></div>`}function edp(){let arr=state.registros.filter(r=>r.edp==='Listo EDP'||String(r.estado).includes('Pendiente OC')||r.ot==='OT enviada'),net=sum(arr,'neto');return `<div class="title"><div><h2>EDP Consolidado</h2><p>Para Lyn: exporta separado por área.</p></div><button class="btn" onclick="exportCSV()">Exportar Excel/CSV</button></div><div class="money"><div><small>Servicios</small><strong>${arr.length}</strong></div><div><small>Neto</small><strong>${money(net)}</strong></div><div><small>IVA</small><strong>${money(iva(net))}</strong></div><div><small>Total</small><strong class="green">${money(net+iva(net))}</strong></div></div><div class="panel">${table(arr)}</div>`}function clientesView(){return `<div class="title"><div><h2>Clientes y Personal</h2><p>Clientes activos reales HNF.</p></div></div><div class="twocol">${clientes.map(c=>`<div class="client"><h3>${c.name}</h3>${tagA(c.area)} <span class="tag ok">${c.estado}</span><p><b>Contacto:</b> ${c.contacto||'—'}<br><b>Correo:</b> ${c.email||'—'}<br><b>RUT:</b> ${c.rut||'—'}<br><b>Tarifa:</b> ${c.tarifa||'—'}</p>${c.name.includes('Tattersall')||c.name.includes('Autotattersall')?`<p><b>Sucursales:</b> ${SUC.join(' · ')}</p>`:''}</div>`).join('')}</div><div class="panel" style="margin-top:16px"><h3>Personal activo</h3>${personal.map(p=>`<p>👤 ${p}</p>`).join('')}</div>`}function archivos(){return `<div class="title"><div><h2>Carpetas y Archivos</h2><p>Carpeta por negocio. No link suelto.</p></div><button class="btn" onclick="openArchivo()">+ Registrar carpeta/archivo</button></div><div class="panel"><div class="notice good"><b>Orden obligatorio:</b> Flota → 01_Flota · Clima → 02_Clima · Obras Civiles → 03_Obras_Civiles · Lavado → 04_Lavado.</div>${state.carpetas.map(c=>`<div class="folder"><div><b>📁 ${c.nombre}</b> <span class="tag ${cls(c.area)}">${c.area}</span><div class="path">${c.ruta}${c.link?'<br>OneDrive activo':''}</div></div><div><button class="btn sec" onclick="openFolder('${c.nombre}')">Abrir carpeta</button> <button class="btn" onclick="openArchivo('${c.nombre}')">Registrar enlace</button></div></div>`).join('')}</div>`}function control(){let rows=state.registros.flatMap(r=>issues(r).map(i=>({r,i})));return `<div class="title"><div><h2>Control</h2><p>Alertas y segregación.</p></div><button class="btn" onclick="fixAreas()">Reordenar ahora</button></div><div class="panel">${rows.length?rows.map(x=>`<div class="notice"><b>${x.r.id}</b> · ${x.r.cliente}: ${x.i}</div>`).join(''):'<div class="notice good">Sin alertas.</div>'}</div>`}function config(){return `<div class="title"><div><h2>Configuración</h2><p>Respaldo y limpieza.</p></div></div><div class="twocol"><div class="panel"><h3>Respaldo</h3><button class="btn" onclick="exportJSON()">Exportar JSON</button> <button class="btn sec" onclick="exportCSV()">Exportar CSV</button></div><div class="panel"><h3>Reglas</h3><p>Cliente define negocio y carpeta automáticamente.</p><button class="btn red" onclick="resetClean()">Restablecer base limpia</button></div></div>`}function renderView(v){if(v==='dashboard')$(v).innerHTML=dashboard();if(v==='registro')$(v).innerHTML=listView('', 'Registro Diario');if(v==='flota')$(v).innerHTML=listView('Flota','Flota');if(v==='clima')$(v).innerHTML=listView('Clima','Clima');if(v==='obras')$(v).innerHTML=listView('Obras Civiles','Obras Civiles');if(v==='lavado')$(v).innerHTML=listView('Lavado','Lavado · Tattersall Sixt');if(v==='presupuestos')$(v).innerHTML=ppto();if(v==='ot')$(v).innerHTML=ot();if(v==='edp')$(v).innerHTML=edp();if(v==='clientes')$(v).innerHTML=clientesView();if(v==='archivos')$(v).innerHTML=archivos();if(v==='control')$(v).innerHTML=control();if(v==='config')$(v).innerHTML=config()}function render(){let crit=state.registros.reduce((a,r)=>a+issues(r).length,0),pend=state.registros.filter(r=>String(r.estado).includes('Pendiente')||String(r.estado).includes('cotización')).length;$('critTxt').textContent=crit+' críticas';$('pendTxt').textContent=pend+' pendientes';$('fechaTxt').textContent=new Date().toLocaleString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});renderView(document.querySelector('.view.active')?.id||'dashboard')}function openForm(id,area=''){let r=id?state.registros.find(x=>x.id===id):{id:'HNF-'+Date.now().toString().slice(-5),fecha:new Date().toISOString().slice(0,10),cliente:area==='Lavado'?'Tattersall Sixt':'',area:area||'Flota',sucursal:'',tipo:'',activo:'',personal:'',responsable:'Hernan Navarro',estado:'Solicitud recibida',neto:0,costo:0,evidencia:'Pendiente',archivo:'',carpeta:AREA_C[area||'Flota'],ot:'Pendiente',edp:'No',facturado:'No',descripcion:'',obs:''};$('modalTitle').textContent=id?'Editar '+id:'Nuevo registro';$('modalBody').innerHTML=form(r);$('modal').classList.add('show')}function form(r){return `<form class="form" onsubmit="saveForm(event)"><input type="hidden" name="oldid" value="${r.id||''}"><label>ID<input name="id" value="${r.id||''}"></label><label>Fecha<input type="date" name="fecha" value="${r.fecha||new Date().toISOString().slice(0,10)}"></label><label>Cliente<select name="cliente" onchange="clientArea(this.form)">${clientes.map(c=>`<option ${r.cliente===c.name?'selected':''}>${c.name}</option>`).join('')}</select></label><label>Área<select name="area" onchange="areaFolder(this.form)">${AREAS.map(a=>`<option ${r.area===a?'selected':''}>${a}</option>`).join('')}</select></label><label>Sucursal<select name="sucursal"><option value="">—</option>${SUC.map(s=>`<option ${r.sucursal===s?'selected':''}>${s}</option>`).join('')}</select></label><label>Tipo<input name="tipo" value="${r.tipo||''}"></label><label>Activo / patente / lugar<input name="activo" value="${r.activo||''}"></label><label>Personal<input name="personal" value="${r.personal||''}"></label><label>Responsable<input name="responsable" value="${r.responsable||'Hernan Navarro'}"></label><label>Estado<input name="estado" value="${r.estado||'Solicitud recibida'}"></label><label>Neto<input type="number" name="neto" value="${r.neto||0}"></label><label>Costo<input type="number" name="costo" value="${r.costo||0}"></label><label>Evidencia<select name="evidencia"><option ${r.evidencia==='Pendiente'?'selected':''}>Pendiente</option><option ${r.evidencia==='Sí'?'selected':''}>Sí</option><option ${r.evidencia==='No'?'selected':''}>No</option></select></label><label>Carpeta<select name="carpeta">${state.carpetas.map(c=>`<option ${r.carpeta===c.nombre?'selected':''}>${c.nombre}</option>`).join('')}</select></label><label>OT<input name="ot" value="${r.ot||'Pendiente'}"></label><label>EDP<input name="edp" value="${r.edp||'No'}"></label><label>Facturado<input name="facturado" value="${r.facturado||'No'}"></label><label class="wide">Descripción<textarea name="descripcion">${r.descripcion||''}</textarea></label><label class="wide">Archivo referencial<input name="archivo" value="${r.archivo||''}"></label><button class="btn wide">Guardar registro</button></form>`}function clientArea(f){let c=clientes.find(x=>x.name===f.cliente.value);if(c){f.area.value=c.area;areaFolder(f)}}function areaFolder(f){f.carpeta.value=AREA_C[f.area.value]||f.carpeta.value}function saveForm(e){e.preventDefault();let d=Object.fromEntries(new FormData(e.target).entries()),old=d.oldid;delete d.oldid;d.neto=Number(d.neto||0);d.costo=Number(d.costo||0);let c=clientes.find(x=>x.name===d.cliente);if(c)d.area=c.area;d.carpeta=AREA_C[d.area];let i=state.registros.findIndex(x=>x.id===old);if(i>=0)state.registros[i]=d;else state.registros.unshift(d);closeModal();save()}function openArchivo(carpeta=''){$('modalTitle').textContent='Registrar carpeta/archivo';$('modalBody').innerHTML=`<form class="form" onsubmit="saveArchivo(event)"><label>Nombre<input name="nombre"></label><label>Cliente<select name="cliente">${clientes.map(c=>`<option>${c.name}</option>`).join('')}</select></label><label>Área<select name="area">${AREAS.map(a=>`<option>${a}</option>`).join('')}</select></label><label>Tipo<input name="tipo"></label><label>Carpeta<select name="carpeta">${state.carpetas.map(c=>`<option ${carpeta===c.nombre?'selected':''}>${c.nombre}</option>`).join('')}</select></label><label class="wide">Enlace carpeta OneDrive<input name="link"></label><button class="btn wide">Guardar</button></form>`;$('modal').classList.add('show')}function saveArchivo(e){e.preventDefault();let d=Object.fromEntries(new FormData(e.target).entries());state.archivos.unshift(d);let c=state.carpetas.find(x=>x.nombre===d.carpeta);if(c&&d.link)c.link=d.link;closeModal();save()}function openFolder(carpeta){let c=state.carpetas.find(x=>x.nombre===carpeta)||{};if(c.link)window.open(c.link,'_blank');else alert('Carpeta registrada: '+(c.ruta||carpeta)+'\nPara abrir directo desde iPad/equipo pega enlace de carpeta OneDrive.')}function closeModal(){$('modal').classList.remove('show')}function fixAreas(){state=clean(state);save();alert('Listo: cada registro quedó en su negocio y carpeta correcta.')}function resetClean(){if(confirm('Restablecer base limpia HNF?')){state=clean({registros:base,archivos:[],carpetas});save()}}function jarvisParse(){let t=$('jarvisTxt').value.toLowerCase(),cliente=t.includes('sixt')?'Tattersall Sixt':t.includes('puma')?'Puma SPA':t.includes('west')?'West':t.includes('grandleasing')?'Grandleasing SPA':t.includes('autotat')?'Autotattersall':'Tattersall Casa Matriz',c=clientes.find(x=>x.name===cliente);openForm(null,c.area);setTimeout(()=>{let f=document.querySelector('.modal form');f.cliente.value=cliente;clientArea(f);f.tipo.value=$('jarvisTxt').value.split('\n')[0].slice(0,70);f.personal.value=($('jarvisTxt').value.match(/Emerson|Andrés Celis|Andres Celis|Andrés Vilches|Bernabé|Yohnatan/i)||[''])[0];f.estado.value=t.includes('oc')?'Pendiente OC':'Solicitud recibida';f.neto.value=($('jarvisTxt').value.match(/neto\D*(\d+)/i)||[])[1]||0;f.descripcion.value=$('jarvisTxt').value},50)}function exportJSON(){let b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='hnf-backup.json';a.click()}function exportCSV(){let arr=state.registros.filter(r=>r.edp==='Listo EDP'||String(r.estado).includes('Pendiente OC')||r.ot==='OT enviada'),h=['ID','Fecha','Cliente','Area','Sucursal','Tipo','Personal','Estado','Neto','Costo','IVA','Total','Carpeta'];let csv=[h,...arr.map(r=>[r.id,r.fecha,r.cliente,r.area,r.sucursal,r.tipo,r.personal,r.estado,r.neto,r.costo,iva(r.neto),Number(r.neto)+iva(r.neto),r.carpeta])].map(x=>x.map(y=>'"'+String(y||'').replaceAll('"','""')+'"').join(';')).join('\n');let b=new Blob([csv],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='EDP_HNF_'+new Date().toISOString().slice(0,10)+'.csv';a.click()}menu();show('dashboard');render();</script></body></html>
