<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HNF OS - Control Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10 bg-slate-800 p-6 rounded-2xl border border-slate-700">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">HNF SERVICIOS</h1>
                <p class="text-slate-400 text-sm">Dashboard Operativo</p>
            </div>
            <div class="text-right">
                <p class="text-xs uppercase text-slate-500 font-bold">Dinero Detenido</p>
                <h2 id="totalDinero" class="text-4xl font-black text-green-500">$ 0</h2>
            </div>
        </div>

        <div id="contenedorOTs" class="grid gap-4"></div>
    </div>

    <script>
        const API = 'https://hnf-backend-production.up.railway.app/api/ots';

        async function render() {
            try {
                const res = await fetch(API);
                const data = await res.json();

                // 1. RANKING POR PRECIO (Mayor a menor)
                data.sort((a, b) => b.precio - a.precio);

                // 2. DINERO DETENIDO
                const total = data.reduce((acc, ot) => ot.estado !== 'Terminado' ? acc + (ot.precio || 0) : acc, 0);
                document.getElementById('totalDinero').innerText = '$ ' + total.toLocaleString('es-CL');

                // 3. RENDER CON RESPONSABLES
                const container = document.getElementById('contenedorOTs');
                container.innerHTML = '';

                data.forEach(ot => {
                    let responsable = "Equipo HNF";
                    if(ot.estado === 'Pendiente') responsable = "Lyn";
                    else if(ot.estado === 'En Proceso' && !ot.precio) responsable = "Gery";
                    else if(ot.modulo === 'Clima') responsable = "Romina";

                    container.innerHTML += `
                        <div class="bg-slate-800 p-5 rounded-xl border-l-4 ${ot.precio > 1000000 ? 'border-red-500' : 'border-blue-500'} flex justify-between items-center">
                            <div>
                                <h3 class="font-bold text-lg">${ot.cliente}</h3>
                                <p class="text-sm text-slate-400">${ot.modulo} | <span class="text-blue-300 font-bold">${responsable}</span></p>
                            </div>
                            <div class="text-right">
                                <p class="text-xl font-mono">${ot.precio.toLocaleString('es-CL')}</p>
                                <span class="text-[10px] px-2 py-1 rounded bg-slate-700 uppercase">${ot.estado}</span>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                document.getElementById('contenedorOTs').innerHTML = "Error de conexión con Railway.";
            }
        }
        render();
    </script>
</body>
</html>
