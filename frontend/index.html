function openFolder(carpeta){let c=state.carpetas.find(x=>x.nombre===carpeta)||{ruta:carpeta}; if(c.link){window.open(c.link,'_blank');return} if(c.fileUrl){window.open(c.fileUrl,'_blank');return} alert('Carpeta registrada: '+(c.ruta||c.nombre)+'\n\nPor seguridad, Safari/Chrome no abren carpetas locales desde una web publicada. Usa “Seleccionar carpeta local” una vez en el equipo, o pega enlace de carpeta OneDrive si quieres que abra al pinchar.');}
async function pickFolder(nombre){let c=state.carpetas.find(x=>x.nombre===nombre); if(!c)return; try{ if(window.showDirectoryPicker){let h=await window.showDirectoryPicker(); c.ruta=h.name; c.local=true; alert('Carpeta seleccionada: '+h.name+'\nQuedó registrada en HNF.'); persist(); return} }catch(e){} $('dirInput').dataset.carpeta=nombre; $('dirInput').click();}
function dirPicked(inp){let nombre=inp.dataset.carpeta;let c=state.carpetas.find(x=>x.nombre===nombre);let f=inp.files&&inp.files[0]; if(c&&f){let root=(f.webkitRelativePath||'').split('/')[0]||nombre; c.ruta=root; c.local=true; alert('Carpeta registrada: '+root); persist()} }
function folderButton(c){return `<div class="folder-card"><div><b>📁 ${c.nombre}</b> <span class="tag ${c.area==='Lavado'?'lavado':c.area==='Flota'?'flota':c.area==='Clima'?'clima':c.area==='Obras Civiles'?'obras':'blue'}">${c.area}</span><div class="folder-path">${c.ruta||''}${c.link?'<br>OneDrive activo':''}</div></div><div class="folder-actions"><button class="btn secondary" onclick="openFolder('${c.nombre}')">Abrir carpeta</button><button class="btn" onclick="pickFolder('${c.nombre}')">Seleccionar carpeta local</button></div></div>`}
function row(r){return `<tr><td><b>${r.id}</b></td><td>${r.fecha}</td><td><b>${r.cliente}</b></td><td>${tagArea(r.area)}</td><td>${r.sucursal||'—'}</td><td>${r.tipo}</td><td>${r.personal}</td><td>${tagEstado(r.estado)}</td><td><b>${money(r.neto)}</b></td><td>${money(r.costo)}</td><td><b>${mrg(r)}${mrg(r)==='—'?'':'%'}</b></td><td>${r.evidencia}</td><td><button class="btn secondary" onclick="openFolder('${r.carpeta||''}')">📁 ${r.carpeta||'Carpeta'}</button></td><td><button class="btn secondary" onclick="openForm('${r.id}')">Editar</button></td></tr>`}
function table(arr){return `<div class="tablewrap"><table><thead><tr><th>ID</th><th>Fecha</th><th>Cliente</th><th>Área</th><th>Sucursal</th><th>Tipo</th><th>Personal</th><th>Estado</th><th>Neto</th><th>Costo</th><th>MRG</th><th>Evid.</th><th>Carpeta</th><th></th></tr></thead><tbody>${arr.map(row).join('')}</tbody></table></div>`}
function dashboard(){let r=state.registros, net=sum(r,'neto'), cost=sum(r,'costo'), lav=r.filter(x=>x.area==='Lavado');return `<div class="title"><div><h2>Resumen Operativo HNF</h2><p>Flota · Clima · Obras Civiles · Lavado · control manual/semi.</p></div><button class="btn" onclick="openForm()">+ Nuevo Registro</button></div><div class="grid kpis"><div class="kpi"><div class="ic">🚙</div><small>Flota</small><strong>${r.filter(x=>x.area==='Flota').length}</strong><span>${money(sum(r.filter(x=>x.area==='Flota'),'neto'))}</span></div><div class="kpi"><div class="ic">❄️</div><small>Clima</small><strong>${r.filter(x=>x.area==='Clima').length}</strong><span>Puma Casa Matriz BI</span></div><div class="kpi"><div class="ic">🏗️</div><small>Obras Civiles</small><strong>${r.filter(x=>x.area==='Obras Civiles').length}</strong><span>Tattersall activo</span></div><div class="kpi"><div class="ic">🫧</div><small>Lavado</small><strong>${lav.length}</strong><span>Tattersall Sixt · pendiente OC</span></div></div><div class="moneyband"><div><small>Facturable neto</small><strong>${money(net)}</strong></div><div><small>Costo neto</small><strong>${money(cost)}</strong></div><div><small>Margen $</small><strong class="green">${money(net-cost)}</strong></div><div><small>OC pendiente lavado</small><strong class="green">${money(sum(lav,'neto'))}</strong></div></div><div class="layout"><div class="panel"><h3>Operaciones reales actuales</h3>${table(r)}</div><aside class="panel"><h3>Acciones rápidas</h3><div class="quick"><button class="btn" onclick="openForm()">+ Nueva solicitud</button><button class="btn" onclick="show('archivos')">📁 Carpetas HNF</button><button class="btn" onclick="show('presupuestos')">Generar Presupuesto</button><button class="btn secondary" onclick="show('edp')">Preparar EDP</button></div><div class="notice" style="margin-top:14px"><b>Prioridad</b><br>Tattersall Sixt: trabajos realizados, a la espera de OC. Validar precio/costo por OT antes de facturar.</div></aside></div>`}
function listView(area,title){let arr=area?state.registros.filter(r=>r.area===area):state.registros;return `<div class="title"><div><h2>${title}</h2><p>${arr.length} registros · Neto ${money(sum(arr,'neto'))}</p></div><button class="btn" onclick="openForm(null,'${area||''}')">+ Nuevo Registro</button></div><div class="filters"><input id="q${area||'all'}" placeholder="Buscar ID, cliente..." oninput="filterTable('${area||''}')"><select onchange="filterTable('${area||''}')" id="e${area||'all'}"><option value="">Todos los estados</option><option>Pendiente OC</option><option>Trabajos realizados - Pendiente OC</option><option>OT enviada</option><option>En cotización</option></select></div><div class="panel" id="tbl${area||'all'}">${table(arr)}</div>`}
function filterTable(area){let q=$('q'+(area||'all')).value.toLowerCase(), e=$('e'+(area||'all')).value;let arr=state.registros.filter(r=>(!area||r.area===area)&&(!e||r.estado.includes(e))&&(!q||JSON.stringify(r).toLowerCase().includes(q)));$('tbl'+(area||'all')).innerHTML=table(arr)}
function ppto(){let r=state.registros.find(x=>x.id==='P-220')||state.registros[0];return `<div class="title"><div><h2>Presupuestos</h2><p>Formato HNF para enviar a cliente.</p></div><button class="btn" onclick="window.print()">Imprimir / PDF</button></div>${docPresupuesto(r)}`}
function docPresupuesto(r){return `<div class="doc"><div class="doc-head"><div><h2>HNF · PRESUPUESTO TÉCNICO COMERCIAL</h2><p>Control Diario 2026</p></div><div><b>N° ${r.id}</b><br>Fecha ${r.fecha}</div></div><div class="doc-body"><div class="box"><b>Cliente:</b> ${r.cliente}<br><b>Área:</b> ${r.area}<br><b>Sucursal/ubicación:</b> ${r.sucursal||r.activo}<br><b>Responsable:</b> ${r.responsable}</div><div class="box"><h3>Diagnóstico / Solicitud</h3><p>${r.descripcion}</p></div><table><thead><tr><th>Ítem</th><th>Descripción</th><th>Cant.</th><th>Total neto</th></tr></thead><tbody><tr><td>1</td><td>${r.tipo}</td><td>1</td><td>${money(r.neto)}</td></tr></tbody></table><div class="total"><span>Neto ${money(r.neto)}</span><span>IVA ${money(iva(r.neto))}</span><span>Total ${money(Number(r.neto)+iva(r.neto))}</span></div></div></div>`}
function ot(){let r=state.registros.find(x=>x.area==='Lavado')||state.registros[0];return `<div class="title"><div><h2>OT / Informe</h2><p>Generación desde registro real.</p></div><button class="btn" onclick="window.print()">Imprimir / PDF</button></div>${docOT(r)}<div class="panel" style="margin-top:18px"><h3>Registros para generar OT</h3>${table(state.registros)}</div>`}
function docOT(r){return `<div class="doc"><div class="doc-head"><div><h2>ORDEN DE TRABAJO</h2><p>Servicios Generales HNF · ${r.area}</p></div><div><b>OT ${r.id}</b><br>${r.fecha}</div></div><div class="doc-body"><div class="box"><b>Cliente:</b> ${r.cliente}<br><b>Sucursal:</b> ${r.sucursal||'—'}<br><b>Técnico:</b> ${r.personal}<br><b>Tipo:</b> ${r.tipo}</div><div class="box"><h3>Descripción servicio realizado</h3><p>${r.descripcion}</p></div><table><thead><tr><th>Descripción</th><th>Total neto</th></tr></thead><tbody><tr><td>${r.tipo}</td><td>${money(r.neto)}</td></tr></tbody></table><div class="box"><b>Evidencia:</b> ${r.evidencia} · <b>Carpeta:</b> ${r.carpeta||'Pendiente'}</div></div></div>`}
function edp(){let arr=state.registros.filter(r=>r.edp==='Listo EDP'||String(r.estado).includes('Pendiente OC')||r.ot==='OT enviada');let net=sum(arr,'neto');return `<div class="title"><div><h2>EDP Consolidado</h2><p>Para Lyn: exportar y adjuntar a correo.</p></div><button class="btn" onclick="exportCSV()">Exportar Excel/CSV</button></div><div class="moneyband"><div><small>Servicios EDP</small><strong>${arr.length}</strong></div><div><small>Neto</small><strong>${money(net)}</strong></div><div><small>IVA</small><strong>${money(iva(net))}</strong></div><div><small>Total</small><strong class="green">${money(net+iva(net))}</strong></div></div><div class="panel">${table(arr)}</div>`}
function clientes(){return `<div class="title"><div><h2>Clientes y Personal</h2><p>Clientes activos reales HNF. Dominion y Romina/Patricio eliminados.</p></div></div><div class="cards">${state.clientes.map(c=>`<div class="client"><h3>${c.name}</h3>${tagArea(c.area.split(' / ')[0])} <span class="tag green">${c.estado}</span><p><b>Contacto:</b> ${c.contacto||'—'}<br><b>Correo:</b> ${c.email||'—'}<br><b>RUT:</b> ${c.rut||'—'}<br><b>Tarifa:</b> ${c.tarifa||'—'}</p>${c.sucursales?`<p><b>Sucursales:</b> ${c.sucursales.join(' · ')}</p>`:''}</div>`).join('')}</div><div class="panel" style="margin-top:16px"><h3>Personal activo</h3>${state.personal.map(p=>`<p>👤 ${p}</p>`).join('')}</div>`}
function archivos(){return `<div class="title"><div><h2>Carpetas y Archivos</h2><p>Al pinchar en Carpeta se abre la carpeta si tiene OneDrive o permiso local. No se trabaja por link de archivo suelto.</p></div><button class="btn" onclick="openArchivo()">+ Registrar carpeta/archivo</button></div><div class="panel"><input id="dirInput" class="filepick" type="file" webkitdirectory directory multiple onchange="dirPicked(this)"><div class="notice ok"><b>Modo correcto:</b> cada OT/EDP apunta a una carpeta HNF. Primero selecciona la carpeta local en el equipo o registra el enlace de carpeta OneDrive. Luego el botón 📁 abre/guía directo a esa carpeta.</div><h3>Carpetas maestras HNF</h3>${state.carpetas.map(folderButton).join('')}</div><div class="panel" style="margin-top:16px"><h3>Archivos/carpeta registrados</h3>${state.archivos.length?tableFiles():'<p style="color:var(--muted)">Sin archivos registrados aún.</p>'}</div>`}
function tableFiles(){return `<div class="tablewrap"><table><thead><tr><th>Nombre</th><th>Cliente</th><th>Área</th><th>Tipo</th><th>Carpeta</th><th></th></tr></thead><tbody>${state.archivos.map(f=>`<tr><td><b>${f.nombre}</b></td><td>${f.cliente}</td><td>${tagArea(f.area)}</td><td>${f.tipo}</td><td>${f.carpeta||f.link||'—'}</td><td><button class="btn secondary" onclick="openFolder('${f.carpeta||''}')">Abrir carpeta</button></td></tr>`).join('')}</tbody></table></div>`}
function control(){let rows=state.registros.flatMap(r=>issues(r).map(i=>({id:r.id,msg:i,r})));return `<div class="title"><div><h2>Control</h2><p>Alertas críticas, margen, OC y cierre.</p></div></div><div class="panel">${rows.length?rows.map(x=>`<div class="notice"><b>${x.id}</b> · ${x.r.cliente}: ${x.msg}</div>`).join(''):'<div class="notice ok">Sin alertas.</div>'}</div>`}
function config(){return `<div class="title"><div><h2>Configuración</h2><p>Exportación y respaldo liviano.</p></div></div><div class="cards"><div class="panel"><h3>Respaldo</h3><button class="btn" onclick="exportJSON()">Exportar JSON completo</button><button class="btn secondary" style="margin-left:8px" onclick="exportCSV()">Exportar CSV EDP</button></div><div class="panel"><h3>Reglas activas</h3><p>Margen bajo &lt;30%. Rojo &lt;15%. Nada a EDP sin OT/OC. Nada se envía sin aprobación Hernan/Lyn.</p></div></div>`}
function renderView(v){if(v==='dashboard')$(v).innerHTML=dashboard(); if(v==='registro')$(v).innerHTML=listView('', 'Registro Diario'); if(v==='flota')$(v).innerHTML=listView('Flota','Flota'); if(v==='clima')$(v).innerHTML=listView('Clima','Clima'); if(v==='obras')$(v).innerHTML=listView('Obras Civiles','Obras Civiles'); if(v==='lavado')$(v).innerHTML=listView('Lavado','Lavado · Tattersall Sixt'); if(v==='presupuestos')$(v).innerHTML=ppto(); if(v==='ot')$(v).innerHTML=ot(); if(v==='edp')$(v).innerHTML=edp(); if(v==='clientes')$(v).innerHTML=clientes(); if(v==='archivos')$(v).innerHTML=archivos(); if(v==='control')$(v).innerHTML=control(); if(v==='config')$(v).innerHTML=config();}
function render(){let crit=state.registros.reduce((a,r)=>a+issues(r).length,0), pend=state.registros.filter(r=>String(r.estado).includes('Pendiente')||String(r.estado).includes('cotización')).length;$('critTxt').textContent=crit+' críticas';$('pendTxt').textContent=pend+' pendientes';$('fechaTxt').textContent=new Date().toLocaleString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});let active=document.querySelector('.view.active')?.id||'dashboard';renderView(active)}
function openForm(id,area=''){let r=id?state.registros.find(x=>x.id===id):{id:'HNF-'+Date.now().toString().slice(-5),fecha:new Date().toISOString().slice(0,10),cliente:area==='Lavado'?'Tattersall Sixt':'',area:area||'Flota',sucursal:'',tipo:'',activo:'',personal:'',responsable:'Hernan Navarro',estado:'Solicitud recibida',neto:0,costo:0,evidencia:'Pendiente',archivo:'',carpeta:area==='Lavado'?'04_Lavado':area==='Clima'?'02_Clima':area==='Obras Civiles'?'03_Obras_Civiles':'01_Flota',ot:'Pendiente',edp:'No',facturado:'No',descripcion:'',obs:''};$('modalTitle').textContent=id?'Editar '+id:'Nuevo registro';$('modalBody').innerHTML=form(r);$('modal').classList.add('show')}
function form(r){return `<form class="form" onsubmit="saveForm(event)"><input type="hidden" name="oldid" value="${r.id||''}"><label>ID<input name="id" value="${r.id||''}"></label><label>Fecha<input type="date" name="fecha" value="${r.fecha||new Date().toISOString().slice(0,10)}"></label><label>Cliente<select name="cliente">${state.clientes.map(c=>`<option ${r.cliente===c.name?'selected':''}>${c.name}</option>`).join('')}</select></label><label>Área<select name="area">${AREAS.map(a=>`<option ${r.area===a?'selected':''}>${a}</option>`).join('')}</select></label><label>Sucursal<select name="sucursal"><option value="">—</option>${SUCURSALES.map(s=>`<option ${r.sucursal===s?'selected':''}>${s}</option>`).join('')}</select></label><label>Tipo<input name="tipo" value="${r.tipo||''}"></label><label>Activo / patente / lugar<input name="activo" value="${r.activo||''}"></label><label>Personal<input name="personal" value="${r.personal||''}"></label><label>Responsable<input name="responsable" value="${r.responsable||'Hernan Navarro'}"></label><label>Estado<input name="estado" value="${r.estado||'Solicitud recibida'}"></label><label>Neto<input type="number" name="neto" value="${r.neto||0}"></label><label>Costo<input type="number" name="costo" value="${r.costo||0}"></label><label>Evidencia<select name="evidencia"><option ${r.evidencia==='Pendiente'?'selected':''}>Pendiente</option><option ${r.evidencia==='Sí'?'selected':''}>Sí</option><option ${r.evidencia==='No'?'selected':''}>No</option></select></label><label>Carpeta<select name="carpeta">${state.carpetas.map(c=>`<option ${r.carpeta===c.nombre?'selected':''}>${c.nombre}</option>`).join('')}</select></label><label>OT<input name="ot" value="${r.ot||'Pendiente'}"></label><label>EDP<input name="edp" value="${r.edp||'No'}"></label><label>Facturado<input name="facturado" value="${r.facturado||'No'}"></label><label class="wide">Descripción<textarea name="descripcion">${r.descripcion||''}</textarea></label><label class="two">Nombre archivo referencial<input name="archivo" value="${r.archivo||''}"></label><label>Obs.<input name="obs" value="${r.obs||''}"></label><button class="btn wide">Guardar registro</button></form>`}
function saveForm(e){e.preventDefault();let d=Object.fromEntries(new FormData(e.target).entries());let old=d.oldid;delete d.oldid;d.neto=Number(d.neto||0);d.costo=Number(d.costo||0);let i=state.registros.findIndex(x=>x.id===old);if(i>=0)state.registros[i]=d;else state.registros.unshift(d);closeModal();persist()}
function closeModal(){$('modal').classList.remove('show')}
function openArchivo(){ $('modalTitle').textContent='Registrar carpeta/archivo'; $('modalBody').innerHTML=`<form class="form" onsubmit="saveArchivo(event)"><label>Nombre<input name="nombre"></label><label>Cliente<select name="cliente">${state.clientes.map(c=>`<option>${c.name}</option>`).join('')}</select></label><label>Área<select name="area">${AREAS.map(a=>`<option>${a}</option>`).join('')}</select></label><label>Tipo<input name="tipo" placeholder="OT, EDP, Evidencia..."></label><label>Carpeta<select name="carpeta">${state.carpetas.map(c=>`<option>${c.nombre}</option>`).join('')}</select></label><label class="two">Enlace de carpeta OneDrive opcional<input name="link" placeholder="Solo si quieres abrir desde cualquier equipo"></label><button class="btn wide">Guardar</button></form>`;$('modal').classList.add('show')}
function saveArchivo(e){e.preventDefault();let d=Object.fromEntries(new FormData(e.target).entries());state.archivos.unshift(d);if(d.link){let c=state.carpetas.find(x=>x.nombre===d.carpeta);if(c)c.link=d.link}closeModal();persist()}
function jarvisParse(){let t=$('jarvisTxt').value;let area=t.toLowerCase().includes('lavado')||t.toLowerCase().includes('sixt')?'Lavado':t.toLowerCase().includes('clima')?'Clima':'Obras Civiles';let r={id:'HNF-'+Date.now().toString().slice(-5),fecha:new Date().toISOString().slice(0,10),cliente:t.toLowerCase().includes('sixt')?'Tattersall Sixt':t.toLowerCase().includes('puma')?'Puma SPA':t.toLowerCase().includes('west')?'West':'Tattersall Casa Matriz',area,sucursal:SUCURSALES.find(s=>t.toLowerCase().includes(s.toLowerCase()))||'',tipo:t.split('\n')[0].slice(0,60),activo:'',personal:t.match(/Emerson|Andrés Celis|Andres Celis|Andrés Vilches|Bernabé|Yohnatan/i)?.[0]||'',responsable:'Hernan Navarro',estado:t.toLowerCase().includes('oc')?'Pendiente OC':'Solicitud recibida',neto:Number((t.match(/neto\D*(\d+)/i)||[])[1]||0),costo:Number((t.match(/costo\D*(\d+)/i)||[])[1]||0),evidencia:'Pendiente',archivo:'',carpeta:area==='Lavado'?'04_Lavado':area==='Clima'?'02_Clima':'03_Obras_Civiles',ot:'Pendiente',edp:'No',facturado:'No',descripcion:t,obs:'Generado desde Jarvis Update'};openForm();setTimeout(()=>{let f=document.querySelector('.modal form');Object.keys(r).forEach(k=>{if(f[k])f[k].value=r[k]})},50)}
function exportJSON(){let b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='hnf-backup.json';a.click()}
function exportCSV(){let arr=state.registros.filter(r=>r.edp==='Listo EDP'||String(r.estado).includes('Pendiente OC')||r.ot==='OT enviada');let h=['ID','Fecha','Cliente','Area','Sucursal','Tipo','Personal','Estado','Neto','Costo','IVA','Total','Carpeta'];let csv=[h,...arr.map(r=>[r.id,r.fecha,r.cliente,r.area,r.sucursal,r.tipo,r.personal,r.estado,r.neto,r.costo,iva(r.neto),Number(r.neto)+iva(r.neto),r.carpeta])].map(x=>x.map(y=>'"'+String(y||'').replaceAll('"','""')+'"').join(';')).join('\n');let b=new Blob([csv],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='EDP_HNF_'+new Date().toISOString().slice(0,10)+'.csv';a.click()}
menu();show('dashboard');render();
</script>
</body>
</html>
