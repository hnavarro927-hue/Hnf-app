ear-gradient(145deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 18px 45px rgba(0,0,0,.22)}.area{text-align:left;cursor:pointer;border-left:6px solid var(--green);min-height:130px}.area span{font-size:24px}.area b,.area strong,.area em{display:block}.area strong{font-size:32px;margin-top:10px;color:#1d8cff}.area em{color:var(--green);font-style:normal;font-weight:950}.card span{color:var(--muted);font-size:12px}.card b{display:block;color:var(--green);font-size:24px;margin-top:7px}.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin:16px 0;flex-wrap:wrap}.toolbar input,.toolbar select,.formbox input,.formbox select,.formbox textarea,.jarvis textarea,.drawer textarea{background:#090c0a;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:11px;width:100%}.toolbar input{max-width:360px}.btn{border:1px solid var(--line);background:#17221a;color:var(--text);border-radius:12px;padding:11px 14px;font-weight:900;cursor:pointer}.btn.primary{background:#10351f;border-color:rgba(120,255,170,.3)}.btn.blue{background:#082f49;border-color:rgba(56,189,248,.35)}.btn.red{background:#3b0d0d;color:#fecaca}.btn:hover{filter:brightness(1.15)}.table{overflow:auto;padding:0}table{width:100%;border-collapse:collapse;min-width:1230px}th,td{padding:12px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;font-size:13px;vertical-align:top}th{position:sticky;top:0;background:#0d120f;color:#dfe7e0;z-index:1}tr:hover td{background:rgba(120,255,170,.04)}.num{text-align:right;font-weight:900}.badge{border:1px solid var(--line);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;display:inline-block}.b-blue{color:var(--blue);background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.35)}.b-green{color:var(--green);background:rgba(120,255,170,.08);border-color:rgba(120,255,170,.28)}.b-red{color:var(--red);background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.3)}.b-amber{color:var(--amber);background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.28)}.b-violet{color:var(--violet);background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.35)}.formbox{display:none;margin:16px 0}.formbox.on{display:block}.formgrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.wide{grid-column:1/-1}.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}.jarvis{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.alert{padding:12px;border-radius:14px;border:1px solid rgba(251,191,36,.25);background:rgba(251,191,36,.06);margin:8px 0;color:#fed7aa}.critical{border-color:rgba(248,113,113,.28);background:rgba(248,113,113,.06);color:#fecaca}.ok{border-color:rgba(120,255,170,.25);background:rgba(120,255,170,.06);color:#bbf7d0}.small{font-size:12px;color:var(--muted)}.drop{border-style:dashed;min-height:96px;text-align:center;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}.drop input{display:none}.files{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.file{border:1px solid var(--line);background:#0b100d;border-radius:14px;padding:8px 10px;display:flex;align-items:center;gap:8px;max-width:240px}.file img{width:34px;height:34px;object-fit:cover;border-radius:8px}.file small{display:block;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}.orb{position:fixed;right:26px;bottom:26px;width:72px;height:72px;border-radius:50%;border:1px solid rgba(120,255,170,.45);background:radial-gradient(circle,#78ffaa,#10351f 58%,#061008);box-shadow:0 0 36px rgba(120,255,170,.35);display:flex;align-items:center;justify-content:center;font-size:29px;z-index:30;cursor:pointer}.drawer{position:fixed;right:22px;bottom:108px;width:390px;max-width:calc(100vw - 32px);display:none;z-index:29}.drawer.on{display:block}.drawer h3{margin:0 0 8px}.drawer textarea{min-height:110px}.mini{display:grid;grid-template-columns:1fr 1fr;gap:8px}.rules span{display:block;margin:8px 0}.linklike{color:var(--green);font-weight:900}.nowrap{white-space:nowrap}.version{position:fixed;right:22px;top:8px;color:#5f6d63;font-size:11px}@media(max-width:1050px){.grid4,.grid5{grid-template-columns:repeat(2,minmax(0,1fr))}.formgrid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:760px){.app{grid-template-columns:1fr}.side{position:relative}.grid4,.grid5,.jarvis,.formgrid,.mini{grid-template-columns:1fr}.main{padding:16px}.table{max-width:100vw}.top{align-items:flex-start;gap:10px;flex-direction:column}}

<div class="version">HNF Pro Local · Jarvis IA Pro v2</div>
<div class="app">
  <aside class="side"><div class="brand">HNF<span>PRO LOCAL</span></div><div class="nav" id="nav"></div><div class="foot"><b>Hernan Navarro</b>Gerencia Comercial<b>Lindsay Astorga</b>Gerencia General</div></aside>

<button class="orb" onclick="toggleDrawer()">🤖</button>
<div class="drawer" id="drawer"><h3>Jarvis IA Pro rápido</h3><p class="small">Pega solicitud o instrucción. Puede crear registro y adjuntar archivos.</p><textarea id="quickTxt" placeholder="Ej: OT 2850 Puma mantención clima Casa Matriz neto 350000 costo 95000 técnico Andrés Vilches tiempo 4 horas"></textarea><label class="drop"><input id="quickFiles" type="file" multiple onchange="handleFiles(this.files,'quick')"><b>Adjuntar evidencia</b><span>Fotos, PDF, Excel, Word</span></label><div id="quickFileList" class="files"></div><div class="actions"><button class="btn" onclick="toggleDrawer()">Cerrar</button><button class="btn primary" onclick="quickCreate()">Crear con IA</button></div><div id="quickResult"></div></div>
<script>
const AREAS=['Flota','Clima','Obras Civiles / SSGG','Lavado Vehículos'];
const PERSONAL=['Hernan Navarro','Lindsay Astorga','Geraldine Catalán','Andrés Celis','Andrés Vilches','Emerson Silva','Yohnatan Castillo'];
const ICON={Flota:'🚗',Clima:'❄️','Obras Civiles / SSGG':'🏗️','Lavado Vehículos':'🫧'};
const KEY='hnf_regs_real_v6', CK='hnf_clientes_real_v6', BK='hnf_backup_v2';
const money=n=>'$'+Number(n||0).toLocaleString('es-CL'); const iva=n=>Math.round(Number(n||0)*.19); const total=n=>Math.round(Number(n||0)*1.19); const pct=(n,c)=>n&&c?Math.round(((n-c)/n)*100):null; const today=()=>new Date().toISOString().slice(0,10); const esc=s=>String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
const baseClients=[{nombre:'Granleasing SPA',area:'Flota'},{nombre:'AutoTattersall',area:'Flota'},{nombre:'Puma SPA',area:'Clima',sucursal:'Casa Matriz'},{nombre:'Tattersall Casa Matriz',area:'Obras Civiles / SSGG',sucursal:'Casa Matriz/ENEA'},{nombre:'Tattersall Sixt / Rent a Car',area:'Lavado Vehículos',sucursal:'Casa Matriz/ENEA'},{nombre:'Autotattersall usados Vitacura',area:'Obras Civiles / SSGG',sucursal:'Vitacura'}];
const base=[{id:'OT-2831',fecha:'2026-04-29',cliente:'Granleasing SPA',area:'Flota',sucursal:'',patente:'VCPT49',tipo:'Traslado',personal:'Andrés Celis',precio:30000,costo:8000,tiempo:'2 h',estado:'OT enviada',notas:'',adjuntos:[]},{id:'INF-186',fecha:'2026-04-17',cliente:'Puma SPA',area:'Clima',sucursal:'Casa Matriz',patente:'',tipo:'Mantención Preventiva',personal:'Andrés Vilches',precio:350000,costo:95000,tiempo:'4 h',estado:'Aprobado',notas:'Generar informe',adjuntos:[]},{id:'OT-2849',fecha:'2026-05-07',cliente:'Autotattersall usados Vitacura',area:'Obras Civiles / SSGG',sucursal:'Vitacura',patente:'',tipo:'Instalación dispensadores',personal:'Emerson Silva',precio:45000,costo:0,tiempo:'',estado:'Ejecutado - Pendiente OC',notas:'Costo pendiente',adjuntos:[]},{id:'LAV-001',fecha:'2026-05-08',cliente:'Tattersall Sixt / Rent a Car',area:'Lavado Vehículos',sucursal:'Casa Matriz/ENEA',patente:'',tipo:'Contrato mensual lavado',personal:'Andrés Celis',precio:1100000,costo:0,tiempo:'1 mes',estado:'Pendiente OC',notas:'No mezclar con obras civiles',adjuntos:[]}];
let registros=normalize(JSON.parse(localStorage.getItem(KEY)||'null')||base); let clientes=JSON.parse(localStorage.getItem(CK)||'null')||baseClients; let view='Dashboard', q='', tempFiles=[], quickFiles=[], jarvisPreview=null;
function normalize(arr){return arr.map(r=>({...r,tiempo:r.tiempo||'',adjuntos:Array.isArray(r.adjuntos)?r.adjuntos:[]}))}
function save(){localStorage.setItem(KEY,JSON.stringify(registros)); localStorage.setItem(CK,JSON.stringify(clientes)); localStorage.setItem(BK,JSON.stringify({fecha:new Date().toISOString(),registros,clientes}));}
function idFor(a){return (a==='Clima'?'INF-':a==='Lavado Vehículos'?'LAV-':'OT-')+Date.now().toString().slice(-5)}
function estadoClass(s){return String(s).includes('OC')?'b-red':s==='Aprobado'||s==='Facturado'||s==='Cerrado'?'b-green':s==='Solicitud recibida'?'b-violet':'b-amber'}
function classify(t){let s=t.toLowerCase(); if(/lavado|sixt|rent a car|preparadas/.test(s))return 'Lavado Vehículos'; if(/puma|clima|climatización|climatizacion|aire|btu|mantención preventiva/.test(s))return 'Clima'; if(/patente|granleasing|rt|revisión técnica|revision tecnica|traslado vehículo|traslado vehiculo/.test(s))return 'Flota'; return 'Obras Civiles / SSGG'}
function detectClient(s,area){return clientes.find(x=>s.includes(x.nombre.toLowerCase()))||clientes.find(x=>s.includes('puma')&&x.nombre.includes('Puma'))||clientes.find(x=>s.includes('sixt')&&x.nombre.includes('Sixt'))||clientes.find(x=>s.includes('vitacura')&&x.nombre.includes('Vitacura'))||clientes.find(x=>x.area===area)||{}}
function detectPersonal(s){return PERSONAL.find(p=>s.includes(p.toLowerCase()))||''}
function numFrom(regex,t){let m=(t.match(regex)||[])[1]; return m?Number(String(m).replaceAll('.','').replaceAll(',','')):0}
function parseText(t,files=[]){let s=t.toLowerCase(), area=classify(t), c=detectClient(s,area), idRaw=(t.match(/(?:OT|LAV|INF)[-\s]*(\d+)/i)||[])[1], price=numFrom(/(?:neto|valor|precio|monto)\s*\$?\s*([0-9.,]+)/i,t), cost=numFrom(/(?:costo|gasto)\s*\$?\s*([0-9.,]+)/i,t), patente=(t.match(/patente\s*([A-Z0-9-]+)/i)||[])[1]||'', tiempo=(t.match(/(?:tiempo|duración|duracion)\s*:?\s*([0-9]+\s*(?:h|hrs|horas|min|días|dias|mes))/i)||[])[1]||''; let estado=s.includes('pendiente oc')?'Pendiente OC':s.includes('ejecutado')?'Ejecutado - Pendiente OC':s.includes('aprobado')?'Aprobado':s.includes('facturado')?'Facturado':'Solicitud recibida'; let tipo=area==='Clima'?'Mantención / Clima':area==='Flota'?'Traslado / RT':area==='Lavado Vehículos'?'Lavado vehículos':'Servicio SSGG'; return {id:idRaw?(area==='Clima'?'INF-':area==='Lavado Vehículos'?'LAV-':'OT-')+idRaw:idFor(area),fecha:today(),cliente:c.nombre||'',area,sucursal:s.includes('vitacura')?'Vitacura':(c.sucursal||''),patente,tipo,personal:detectPersonal(s),precio:price,costo:cost,tiempo,estado,notas:t,adjuntos:files}}
function audit(r){let miss=[]; if(!r.cliente)miss.push('cliente'); if(!Number(r.precio))miss.push('precio'); if(!Number(r.costo))miss.push('costo'); if(!r.personal)miss.push('técnico/responsable'); if(!r.tiempo)miss.push('tiempo'); return miss}
function rows(){return registros.filter(r=>(view==='Dashboard'||view==='Registro Diario'||r.area===view)&&(!q||Object.values({...r,adjuntos:''}).join(' ').toLowerCase().includes(q.toLowerCase())))}
function render(){document.getElementById('today').textContent=new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); let oc=registros.filter(r=>String(r.estado).includes('OC')).length, incomplete=registros.filter(r=>audit(r).length).length; document.getElementById('topAlert').innerHTML=`${oc?`<span class="pill danger">🔴 ${oc} OC pendientes</span>`:''}${incomplete?`<span class="pill danger">⚠️ ${incomplete} incompletos</span>`:'<span class="pill">Operación activa</span>'}<button class="btn blue" onclick="go('Jarvis IA Pro')">🤖 IA Pro</button>`; document.getElementById('nav').innerHTML=['Dashboard','Registro Diario',...AREAS,'EDP','Control','Jarvis IA Pro','Backup'].map(v=>`<button class="${view===v?'on':''}" onclick="go('${v}')">${v}</button>`).join(''); if(view==='Dashboard')dash(); else if(view==='EDP')edp(); else if(view==='Control')control(); else if(view==='Jarvis IA Pro')jarvis(); else if(view==='Backup')backup(); else listado();}
function dash(){let net=registros.reduce((s,r)=>s+Number(r.precio||0),0), cost=registros.reduce((s,r)=>s+Number(r.costo||0),0), incomplete=registros.filter(r=>audit(r).length).length; document.getElementById('view').innerHTML=`<h1>Dashboard Gerencial</h1><p>Vista rápida para cerrar, cobrar y controlar utilidad.</p><div class="grid4">${AREAS.map(a=>{let rs=registros.filter(r=>r.area===a), n=rs.reduce((s,r)=>s+Number(r.precio||0),0);return `<button class="area" onclick="go('${a}')"><span>${ICON[a]}</span><b>${a}</b><strong>${rs.length}</strong><em>${money(n)}</em></button>`}).join('')}</div><div class="grid5"><div class="card"><span>Neto</span><b>${money(net)}</b></div><div class="card"><span>IVA</span><b>${money(iva(net))}</b></div><div class="card"><span>Total</span><b>${money(total(net))}</b></div><div class="card"><span>Costo</span><b>${cost?money(cost):'Pendiente'}</b></div><div class="card"><span>Incompletos</span><b>${incomplete}</b></div></div><h2>Últimos registros</h2>${table(registros.slice(-8).reverse())}`}
function fileHtml(files=[]){return files.length?`<div class="files">${files.map(f=>`<span class="file">${f.preview?`<img src="${f.preview}">`:'📎'}<small title="${esc(f.name)}">${esc(f.name)}<br>${Math.round((f.size||0)/1024)} KB</small></span>`).join('')}</div>`:'<span class="small">Sin adjuntos</span>'}
function table(rs){return `<div class="table"><table><thead><tr><th>ID</th><th>Fecha</th><th>Cliente</th><th>Área</th><th>Sucursal/Patente</th><th>Tipo</th><th>Personal</th><th>Tiempo</th><th>Estado</th><th>Neto</th><th>Costo</th><th>Margen</th><th>Adj.</th><th>Control</th><th></th></tr></thead><tbody>${rs.map(r=>{let miss=audit(r);return `<tr><td><b>${esc(r.id)}</b></td><td>${esc(r.fecha)}</td><td>${esc(r.cliente)}</td><td><span class="badge ${r.area==='Clima'?'b-blue':'b-green'}">${ICON[r.area]||''} ${esc(r.area)}</span></td><td>${esc(r.sucursal||r.patente||'')}</td><td>${esc(r.tipo)}</td><td>${esc(r.personal)}</td><td>${esc(r.tiempo)}</td><td><span class="badge ${estadoClass(r.estado)}">${esc(r.estado)}</span></td><td class="num">${money(r.precio)}</td><td class="num">${r.costo?money(r.costo):'<span class="badge b-amber">Pendiente</span>'}</td><td>${r.costo?pct(r.precio,r.costo)+'%':'-'}</td><td>${(r.adjuntos||[]).length?`<span class="badge b-blue">${r.adjuntos.length}</span>`:'-'}</td><td>${miss.length?`<span class="badge b-red">Falta ${miss.join(', ')}</span>`:'<span class="badge b-green">OK</span>'}</td><td><button class="btn" onclick="detail('${esc(r.id)}')">Ver</button> <button class="btn red" onclick="del('${esc(r.id)}')">×</button></td></tr>`}).join('')}</tbody></table></div>`}
function listado(){let rs=rows(), net=rs.reduce((s,r)=>s+Number(r.precio||0),0); document.getElementById('view').innerHTML=`<h1>${view}</h1><p>${rs.length} registros · Neto ${money(net)}</p><div class="toolbar"><input placeholder="Buscar cliente, patente, OT..." value="${esc(q)}" oninput="q=this.value;render()"><button class="btn primary" onclick="toggleForm()">+ Nuevo con adjuntos</button></div><div id="form" class="formbox">${formHtml()}</div>${table(rs)}`}
function formHtml(){tempFiles=[];return `<div class="formgrid"><input id="cliente" placeholder="Cliente"><select id="area">${AREAS.map(a=>`<option>${a}</option>`)}</select><input id="sucursal" placeholder="Sucursal / patente"><input id="tipo" placeholder="Tipo servicio"><input id="personal" placeholder="Técnico / responsable"><input id="tiempo" placeholder="Tiempo usado"><input id="precio" type="number" placeholder="Precio neto"><input id="costo" type="number" placeholder="Costo"><select id="estado"><option>Solicitud recibida</option><option>En ejecución</option><option>Ejecutado - Pendiente OC</option><option>Pendiente OC</option><option>OT enviada</option><option>Listo EDP</option><option>Facturado</option><option>Cerrado</option></select><textarea id="notas" class="wide" placeholder="Descripción / notas"></textarea><label class="drop wide"><input id="manualFiles" type="file" multiple onchange="handleFiles(this.files,'manual')"><b>Adjuntar evidencia / archivo</b><span>Fotos, PDF, Excel o Word. Se guarda localmente la referencia y miniatura de imagen.</span></label><div id="manualFileList" class="files wide"></div></div><div class="actions"><button class="btn" onclick="toggleForm()">Cerrar</button><button class="btn primary" onclick="saveForm()">Guardar registro</button></div>`}
function toggleForm(){document.getElementById('form')?.classList.toggle('on')}
function saveForm(){let a=val('area'); let r={id:idFor(a),fecha:today(),cliente:val('cliente'),area:a,sucursal:val('sucursal'),patente:'',tipo:val('tipo'),personal:val('personal'),tiempo:val('tiempo'),precio:Number(val('precio')),costo:Number(val('costo')),estado:val('estado'),notas:val('notas'),adjuntos:tempFiles}; registros.push(r); save(); render()}
function val(id){return document.getElementById(id)?.value||''}
function edp(){let rs=registros.filter(r=>String(r.estado).includes('OC')||r.estado==='OT enviada'||r.estado==='Listo EDP'||r.estado==='Facturado'), net=rs.reduce((s,r)=>s+Number(r.precio||0),0), block=rs.filter(r=>audit(r).length).length; document.getElementById('view').innerHTML=`<h1>EDP / Cobros</h1><p>Servicios listos para cobrar o gestionar OC. Los incompletos deben corregirse antes de enviar EDP final.</p><div class="grid5"><div class="card"><span>Servicios</span><b>${rs.length}</b></div><div class="card"><span>Neto</span><b>${money(net)}</b></div><div class="card"><span>IVA</span><b>${money(iva(net))}</b></div><div class="card"><span>Total</span><b>${money(total(net))}</b></div><div class="card"><span>Bloqueos</span><b>${block}</b></div></div><div class="toolbar"><button class="btn primary" onclick="csv()">Exportar CSV</button></div>${table(rs)}`}
function csv(){let h=['ID','Fecha','Cliente','Area','Sucursal','Patente','Tipo','Personal','Tiempo','Neto','IVA','Total','Costo','Margen','Estado','Adjuntos','Faltantes'];let out=[h,...registros.map(r=>[r.id,r.fecha,r.cliente,r.area,r.sucursal,r.patente,r.tipo,r.personal,r.tiempo,r.precio,iva(r.precio),total(r.precio),r.costo,pct(r.precio,r.costo)||'',r.estado,(r.adjuntos||[]).map(f=>f.name).join(' | '),audit(r).join(' | ')])].map(x=>x.map(v=>'"'+String(v||'').replaceAll('"','""')+'"').join(',')).join('\n');let b=new Blob(['\uFEFF'+out],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='HNF_EDP_'+today()+'.csv';a.click()}
function control(){let alerts=[];registros.forEach(r=>{let miss=audit(r); if(String(r.estado).includes('OC'))alerts.push(['critical','🔴 '+r.id+' '+r.cliente+': OC pendiente']); if(miss.length)alerts.push(['alert','⚠️ '+r.id+' '+r.cliente+': falta '+miss.join(', ')]); if(Number(r.precio)&&Number(r.costo)&&pct(r.precio,r.costo)<25)alerts.push(['critical','📉 '+r.id+' '+r.cliente+': margen bajo '+pct(r.precio,r.costo)+'%']);});document.getElementById('view').innerHTML=`<h1>Control Gerencial</h1><p>Regla HNF: toda OT debe tener cliente, precio, costo, técnico y tiempo.</p>${alerts.map(a=>`<div class="${a[0]}">${esc(a[1])}</div>`).join('')||'<div class="alert ok">Sin alertas críticas.</div>'}<div class="rules"><span>✓ Nada pasa a EDP final si falta costo o responsable.</span><span>✓ Evidencia/adjuntos deben quedar en el registro antes de cerrar.</span><span>✓ Hernan o Lindsay aprueban cierre sensible.</span></div>`}
function jarvis(){tempFiles=[];document.getElementById('view').innerHTML=`<h1>🤖 Jarvis IA Pro</h1><p>Pega texto de WhatsApp, PDF copiado, Excel pegado o instrucción operacional. Adjunta evidencia y Jarvis crea el registro.</p><div class="jarvis"><div><textarea id="jtxt" rows="13" placeholder="Ej: OT 2850 Puma mantención clima Casa Matriz neto 350000 costo 95000 técnico Andrés Vilches tiempo 4 horas aprobado"></textarea><label class="drop"><input id="jFiles" type="file" multiple onchange="handleFiles(this.files,'manual')"><b>Adjuntar evidencia IA Pro</b><span>Fotos, PDF, Excel, Word</span></label><div id="manualFileList" class="files"></div><div class="actions"><button class="btn blue" onclick="analyzeOnly()">Analizar</button><button class="btn primary" onclick="previewJarvis()">Interpretar y preparar</button></div></div><div id="jprev" class="card">Esperando instrucción...</div></div>`}
function analyzeOnly(){let r=parseText(val('jtxt'),tempFiles), miss=audit(r);document.getElementById('jprev').innerHTML=`<h2>Diagnóstico IA Pro</h2><p><span class="badge ${r.area==='Clima'?'b-blue':'b-green'}">${ICON[r.area]} ${esc(r.area)}</span></p><div class="${miss.length?'alert':'alert ok'}">${miss.length?'Faltan: '+esc(miss.join(', ')):'Registro completo para avanzar.'}</div><p><b>Acción sugerida:</b> ${miss.length?'pedir datos faltantes antes de EDP.':'guardar registro y preparar respaldo.'}</p>${fileHtml(tempFiles)}`}
function previewJarvis(){jarvisPreview=parseText(val('jtxt'),tempFiles);let r=jarvisPreview, miss=audit(r);document.getElementById('jprev').innerHTML=`<h2>Preview editable IA Pro</h2><div class="mini"><label>Cliente<input id="pv_cliente" value="${esc(r.cliente)}"></label><label>Área<select id="pv_area">${AREAS.map(a=>`<option ${a===r.area?'selected':''}>${a}</option>`).join('')}</select></label><label>Sucursal<input id="pv_sucursal" value="${esc(r.sucursal)}"></label><label>Personal<input id="pv_personal" value="${esc(r.personal)}"></label><label>Tiempo<input id="pv_tiempo" value="${esc(r.tiempo)}"></label><label>Neto<input id="pv_precio" type="number" value="${r.precio||0}"></label><label>Costo<input id="pv_costo" type="number" value="${r.costo||0}"></label><label>Estado<select id="pv_estado"><option>${esc(r.estado)}</option><option>Solicitud recibida</option><option>En ejecución</option><option>Ejecutado - Pendiente OC</option><option>Pendiente OC</option><option>OT enviada</option><option>Listo EDP</option><option>Facturado</option><option>Cerrado</option></select></label></div><p class="small">${miss.length?'Faltan: '+esc(miss.join(', ')):'Completo.'}</p>${fileHtml(r.adjuntos)}<div class="actions"><button class="btn primary" onclick="saveJarvisPreview()">Guardar registro IA Pro</button></div>`}
function saveJarvisPreview(){let r=jarvisPreview||parseText(val('jtxt'),tempFiles); r={...r,cliente:val('pv_cliente')||r.cliente,area:val('pv_area')||r.area,sucursal:val('pv_sucursal')||r.sucursal,personal:val('pv_personal')||r.personal,tiempo:val('pv_tiempo')||r.tiempo,precio:Number(val('pv_precio')||r.precio),costo:Number(val('pv_costo')||r.costo),estado:val('pv_estado')||r.estado}; registros.push(r); save(); tempFiles=[]; go('Registro Diario')}
function backup(){document.getElementById('view').innerHTML=`<h1>Backup local</h1><p>Exporta respaldo JSON. Esto no reemplaza OneDrive/Mongo, pero protege el trabajo local.</p><div class="actions" style="justify-content:flex-start"><button class="btn primary" onclick="downloadBackup()">Descargar respaldo JSON</button><label class="btn blue">Importar respaldo<input type="file" accept="application/json" style="display:none" onchange="importBackup(this.files[0])"></label></div><div class="rules"><span>Último respaldo local automático: ${esc((JSON.parse(localStorage.getItem(BK)||'{}').fecha)||'sin fecha')}</span><span>Registros actuales: ${registros.length}</span></div>`}
function downloadBackup(){let b=new Blob([JSON.stringify({fecha:new Date().toISOString(),registros,clientes},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='HNF_BACKUP_'+today()+'.json';a.click()}
function importBackup(file){if(!file)return;let fr=new FileReader();fr.onload=()=>{try{let data=JSON.parse(fr.result); if(Array.isArray(data.registros)){registros=normalize(data.registros); clientes=data.clientes||clientes; save(); render(); alert('Backup importado')}else alert('Archivo inválido')}catch(e){alert('No se pudo importar')}};fr.readAsText(file)}
function handleFiles(files,mode){let target=mode==='quick'?quickFiles:tempFiles; [...files].forEach(file=>{let item={name:file.name,type:file.type,size:file.size,at:new Date().toISOString(),preview:null}; if(file.type.startsWith('image/')&&file.size<900000){let fr=new FileReader();fr.onload=()=>{item.preview=fr.result; target.push(item); drawFiles(mode)};fr.readAsDataURL(file)}else{target.push(item); drawFiles(mode)}})}
function drawFiles(mode){let id=mode==='quick'?'quickFileList':'manualFileList', target=mode==='quick'?quickFiles:tempFiles; let el=document.getElementById(id); if(el)el.innerHTML=fileHtml(target)}
function toggleDrawer(){document.getElementById('drawer').classList.toggle('on')}
function quickCreate(){let r=parseText(val('quickTxt'),quickFiles), miss=audit(r); registros.push(r); save(); document.getElementById('quickResult').innerHTML=`<div class="${miss.length?'alert':'alert ok'}">Creado ${esc(r.id)} · ${miss.length?'faltan '+esc(miss.join(', ')):'registro completo'}</div>`; quickFiles=[]; drawFiles('quick'); render()}
function detail(id){let r=registros.find(x=>x.id===id); if(!r)return; let miss=audit(r); document.getElementById('view').innerHTML=`<h1>${esc(r.id)} · ${esc(r.cliente)}</h1><p>${esc(r.tipo)} · ${esc(r.estado)}</p><div class="grid4"><div class="card"><span>Neto</span><b>${money(r.precio)}</b></div><div class="card"><span>Costo</span><b>${money(r.costo)}</b></div><div class="card"><span>Margen</span><b>${r.costo?pct(r.precio,r.costo)+'%':'-'}</b></div><div class="card"><span>Adjuntos</span><b>${(r.adjuntos||[]).length}</b></div></div><div class="rules"><span><b>Área:</b> ${esc(r.area)}</span><span><b>Sucursal/Patente:</b> ${esc(r.sucursal||r.patente)}</span><span><b>Responsable:</b> ${esc(r.personal)}</span><span><b>Tiempo:</b> ${esc(r.tiempo)}</span><span><b>Notas:</b> ${esc(r.notas)}</span></div>${miss.length?`<div class="alert critical">Falta corregir: ${esc(miss.join(', '))}</div>`:'<div class="alert ok">Registro completo.</div>'}<h2>Adjuntos / Evidencia</h2>${fileHtml(r.adjuntos)}<div class="actions" style="justify-content:flex-start"><button class="btn" onclick="go('Registro Diario')">Volver</button></div>`}
function del(id){if(confirm('Eliminar '+id+'?')){registros=registros.filter(r=>r.id!==id);save();render()}}
function go(v){view=v;q='';render()}
save();render();
</script>
</body>
</html>
