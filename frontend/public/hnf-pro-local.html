<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HNF Pro Local</title>
<style>
:root{--bg:#090c0a;--panel:#151a17;--panel2:#1b221d;--line:rgba(255,255,255,.12);--text:#f7faf6;--muted:#93a096;--green:#78ffaa;--red:#f87171;--amber:#fbbf24;--blue:#38bdf8}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 18% 0%,rgba(120,255,170,.08),transparent 34%),var(--bg);color:var(--text);font-family:Inter,Segoe UI,system-ui,sans-serif}.app{min-height:100vh;display:grid;grid-template-columns:250px 1fr}.side{background:#060907;border-right:1px solid rgba(120,255,170,.2);padding:22px 0;display:flex;flex-direction:column;box-shadow:18px 0 55px rgba(0,0,0,.32)}.brand{padding:0 22px 26px;font-weight:950;font-size:34px;letter-spacing:8px}.brand span{display:block;color:var(--green);font-size:10px;letter-spacing:4px;margin-top:8px}.nav button{width:calc(100% - 24px);margin:2px 12px;border:0;border-left:4px solid transparent;border-radius:13px;background:transparent;color:#b8c1ba;text-align:left;padding:12px 14px;font-weight:800;cursor:pointer}.nav button.on,.nav button:hover{background:rgba(120,255,170,.1);color:#fff;border-left-color:var(--green)}.foot{margin-top:auto;padding:18px 22px;border-top:1px solid var(--line);color:var(--muted);font-size:12px}.foot b{display:block;color:#fff;margin-top:8px}.main{padding:24px 30px;overflow:auto}.top{display:flex;justify-content:space-between;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:20px}.top h2,.top p{margin:0}.top p{color:var(--muted);font-size:13px}.pill{border:1px solid var(--line);border-radius:999px;padding:8px 12px;background:#101411;color:var(--text);font-weight:850}.danger{color:var(--red);border-color:rgba(248,113,113,.35);background:rgba(248,113,113,.08)}h1{margin:0 0 5px;font-size:30px}p{color:var(--muted)}.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.grid5{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}.card,.area,.table,.jarvis,.formbox{background:linear-gradient(145deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 18px 45px rgba(0,0,0,.22)}.area{text-align:left;cursor:pointer;border-left:6px solid var(--green)}.area span{font-size:24px}.area b,.area strong,.area em{display:block}.area strong{font-size:32px;margin-top:10px}.area em{color:var(--green);font-style:normal;font-weight:950}.card span{color:var(--muted);font-size:12px}.card b{display:block;color:var(--green);font-size:24px;margin-top:7px}.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin:16px 0}.toolbar input,.toolbar select,.formbox input,.formbox select,.formbox textarea,.jarvis textarea{background:#090c0a;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:11px;width:100%}.toolbar input{max-width:360px}.btn{border:1px solid var(--line);background:#17221a;color:var(--text);border-radius:12px;padding:11px 14px;font-weight:900;cursor:pointer}.btn.primary{background:#10351f;border-color:rgba(120,255,170,.3)}.btn.red{background:#3b0d0d;color:#fecaca}.table{overflow:auto;padding:0}table{width:100%;border-collapse:collapse;min-width:1040px}th,td{padding:12px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;font-size:13px}th{position:sticky;top:0;background:#0d120f;color:#dfe7e0;z-index:1}tr:hover td{background:rgba(120,255,170,.04)}.num{text-align:right;font-weight:900}.badge{border:1px solid var(--line);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;display:inline-block}.b-blue{color:var(--blue);background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.35)}.b-green{color:var(--green);background:rgba(120,255,170,.08);border-color:rgba(120,255,170,.28)}.b-red{color:var(--red);background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.3)}.b-amber{color:var(--amber);background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.28)}.formbox{display:none;margin:16px 0}.formbox.on{display:block}.formgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.wide{grid-column:1/-1}.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:12px}.jarvis{display:grid;grid-template-columns:1fr 1fr;gap:14px}.alert{padding:12px;border-radius:14px;border:1px solid rgba(251,191,36,.25);background:rgba(251,191,36,.06);margin:8px 0;color:#fed7aa}.small{font-size:12px;color:var(--muted)}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative}.grid4,.grid5,.jarvis,.formgrid{grid-template-columns:1fr}.main{padding:16px}.table{max-width:100vw}}
</style>
</head>
<body>
<div class="app">
  <aside class="side"><div class="brand">HNF<span>PRO LOCAL</span></div><div class="nav" id="nav"></div><div class="foot"><b>Hernan Navarro</b>Gerencia Comercial<b>Lindsay Astorga</b>Gerencia General</div></aside>
  <main class="main"><div class="top"><div><h2>HNF Pro Local listo para operar</h2><p id="today"></p></div><div id="topAlert"></div></div><section id="view"></section></main>
</div>
<script>
const AREAS=['Flota','Clima','Obras Civiles / SSGG','Lavado Vehículos'];
const ICON={Flota:'🚗',Clima:'❄️','Obras Civiles / SSGG':'🏗️','Lavado Vehículos':'🫧'};
const KEY='hnf_regs_real_v6', CK='hnf_clientes_real_v6';
const money=n=>'$'+Number(n||0).toLocaleString('es-CL'); const iva=n=>Math.round(Number(n||0)*.19); const total=n=>Math.round(Number(n||0)*1.19); const pct=(n,c)=>n&&c?Math.round(((n-c)/n)*100):null; const today=()=>new Date().toISOString().slice(0,10);
const baseClients=[{nombre:'Granleasing SPA',area:'Flota'},{nombre:'AutoTattersall',area:'Flota'},{nombre:'Puma SPA',area:'Clima',sucursal:'Casa Matriz'},{nombre:'Tattersall Casa Matriz',area:'Obras Civiles / SSGG',sucursal:'Casa Matriz/ENEA'},{nombre:'Tattersall Sixt / Rent a Car',area:'Lavado Vehículos',sucursal:'Casa Matriz/ENEA'}];
const base=[{id:'OT-2831',fecha:'2026-04-29',cliente:'Granleasing SPA',area:'Flota',sucursal:'',patente:'VCPT49',tipo:'Traslado',personal:'Andrés Celis',precio:30000,costo:8000,estado:'OT enviada',notas:''},{id:'INF-186',fecha:'2026-04-17',cliente:'Puma SPA',area:'Clima',sucursal:'Casa Matriz',patente:'',tipo:'Mantención Preventiva',personal:'Andrés Vilches',precio:350000,costo:95000,estado:'Aprobado',notas:'Generar informe'},{id:'OT-2849',fecha:'2026-05-07',cliente:'Autotattersall usados Vitacura',area:'Obras Civiles / SSGG',sucursal:'Vitacura',patente:'',tipo:'Instalación dispensadores',personal:'Emerson Silva',precio:45000,costo:0,estado:'Ejecutado - Pendiente OC',notas:'Costo pendiente'},{id:'LAV-001',fecha:'2026-05-08',cliente:'Tattersall Sixt / Rent a Car',area:'Lavado Vehículos',sucursal:'Casa Matriz/ENEA',patente:'',tipo:'Contrato mensual lavado',personal:'Andrés Celis',precio:1100000,costo:0,estado:'Pendiente OC',notas:'No mezclar con obras civiles'}];
let registros=JSON.parse(localStorage.getItem(KEY)||'null')||base; let clientes=JSON.parse(localStorage.getItem(CK)||'null')||baseClients; let view='Dashboard', q='', farea='';
function save(){localStorage.setItem(KEY,JSON.stringify(registros)); localStorage.setItem(CK,JSON.stringify(clientes));}
function idFor(a){return (a==='Clima'?'INF-':a==='Lavado Vehículos'?'LAV-':'OT-')+Date.now().toString().slice(-5)}
function estadoClass(s){return String(s).includes('OC')?'b-red':s==='Aprobado'||s==='Facturado'||s==='Cerrado'?'b-green':'b-amber'}
function classify(t){let s=t.toLowerCase(); if(s.includes('lavado')||s.includes('sixt'))return 'Lavado Vehículos'; if(s.includes('puma')||s.includes('clima')||s.includes('aire'))return 'Clima'; if(s.includes('patente')||s.includes('granleasing')||s.includes('rt'))return 'Flota'; return 'Obras Civiles / SSGG'}
function parseText(t){let area=classify(t), s=t.toLowerCase(), c=clientes.find(x=>s.includes(x.nombre.toLowerCase().split(' ')[0]))||clientes.find(x=>x.area===area)||{}; let p=(t.match(/(?:neto|valor|precio)\s*\$?\s*([0-9.]+)/i)||[])[1]; return {id:idFor(area),fecha:today(),cliente:c.nombre||'',area,sucursal:c.sucursal||'',patente:(t.match(/patente\s*([A-Z0-9-]+)/i)||[])[1]||'',tipo:area==='Clima'?'Mantención / Clima':area==='Flota'?'Traslado / RT':area==='Lavado Vehículos'?'Lavado vehículos':'Servicio SSGG',personal:'',precio:p?Number(p.replaceAll('.','')):0,costo:0,estado:'Solicitud recibida',notas:t}}
function rows(){return registros.filter(r=>(view==='Dashboard'||view==='Registro Diario'||r.area===view)&&(!q||Object.values(r).join(' ').toLowerCase().includes(q.toLowerCase()))&&(!farea||r.area===farea));}
function render(){document.getElementById('today').textContent=new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); let oc=registros.filter(r=>String(r.estado).includes('OC')).length; document.getElementById('topAlert').innerHTML=oc?`<span class="pill danger">🔴 ${oc} OC pendientes</span>`:`<span class="pill">Operación activa</span>`; document.getElementById('nav').innerHTML=['Dashboard','Registro Diario',...AREAS,'EDP','Control','Jarvis'].map(v=>`<button class="${view===v?'on':''}" onclick="go('${v}')">${v}</button>`).join(''); if(view==='Dashboard')dash(); else if(view==='EDP')edp(); else if(view==='Control')control(); else if(view==='Jarvis')jarvis(); else listado();}
function dash(){let net=registros.reduce((s,r)=>s+Number(r.precio||0),0), cost=registros.reduce((s,r)=>s+Number(r.costo||0),0); document.getElementById('view').innerHTML=`<h1>Dashboard Gerencial</h1><p>Vista rápida para cerrar, cobrar y controlar utilidad.</p><div class="grid4">${AREAS.map(a=>{let rs=registros.filter(r=>r.area===a), n=rs.reduce((s,r)=>s+Number(r.precio||0),0);return `<button class="area" onclick="go('${a}')"><span>${ICON[a]}</span><b>${a}</b><strong>${rs.length}</strong><em>${money(n)}</em></button>`}).join('')}</div><div class="grid5"><div class="card"><span>Neto</span><b>${money(net)}</b></div><div class="card"><span>IVA</span><b>${money(iva(net))}</b></div><div class="card"><span>Total</span><b>${money(total(net))}</b></div><div class="card"><span>Costo</span><b>${cost?money(cost):'Pendiente'}</b></div><div class="card"><span>Utilidad</span><b>${money(net-cost)}</b></div></div><h2>Últimos registros</h2>${table(registros.slice(-8).reverse())}`}
function table(rs){return `<div class="table"><table><thead><tr><th>ID</th><th>Fecha</th><th>Cliente</th><th>Área</th><th>Sucursal/Patente</th><th>Tipo</th><th>Personal</th><th>Estado</th><th>Neto</th><th>Costo</th><th>Margen</th><th></th></tr></thead><tbody>${rs.map((r,i)=>`<tr><td><b>${r.id}</b></td><td>${r.fecha||''}</td><td>${r.cliente||''}</td><td><span class="badge ${r.area==='Clima'?'b-blue':'b-green'}">${ICON[r.area]||''} ${r.area}</span></td><td>${r.sucursal||r.patente||''}</td><td>${r.tipo||''}</td><td>${r.personal||''}</td><td><span class="badge ${estadoClass(r.estado)}">${r.estado||''}</span></td><td class="num">${money(r.precio)}</td><td class="num">${r.costo?money(r.costo):'<span class="badge b-amber">Pendiente</span>'}</td><td>${r.costo?pct(r.precio,r.costo)+'%':'-'}</td><td><button class="btn red" onclick="del('${r.id}')">×</button></td></tr>`).join('')}</tbody></table></div>`}
function listado(){let rs=rows(), net=rs.reduce((s,r)=>s+Number(r.precio||0),0); document.getElementById('view').innerHTML=`<h1>${view}</h1><p>${rs.length} registros · Neto ${money(net)}</p><div class="toolbar"><input placeholder="Buscar cliente, patente, OT..." value="${q}" oninput="q=this.value;render()"><button class="btn primary" onclick="toggleForm()">+ Nuevo</button></div><div id="form" class="formbox">${formHtml()}</div>${table(rs)}`}
function formHtml(){return `<div class="formgrid"><input id="cliente" placeholder="Cliente"><select id="area">${AREAS.map(a=>`<option>${a}</option>`)}</select><input id="sucursal" placeholder="Sucursal / patente"><input id="tipo" placeholder="Tipo servicio"><input id="personal" placeholder="Técnico / responsable"><input id="precio" type="number" placeholder="Precio neto"><input id="costo" type="number" placeholder="Costo"><select id="estado"><option>Solicitud recibida</option><option>En ejecución</option><option>Ejecutado - Pendiente OC</option><option>Pendiente OC</option><option>OT enviada</option><option>Facturado</option><option>Cerrado</option></select><textarea id="notas" class="wide" placeholder="Descripción / notas"></textarea></div><div class="actions"><button class="btn" onclick="toggleForm()">Cerrar</button><button class="btn primary" onclick="saveForm()">Guardar registro</button></div>`}
function toggleForm(){document.getElementById('form')?.classList.toggle('on')}
function saveForm(){let a=document.getElementById('area').value; registros.push({id:idFor(a),fecha:today(),cliente:val('cliente'),area:a,sucursal:val('sucursal'),patente:'',tipo:val('tipo'),personal:val('personal'),precio:Number(val('precio')),costo:Number(val('costo')),estado:val('estado'),notas:val('notas')}); save(); render()}
function val(id){return document.getElementById(id)?.value||''}
function edp(){let rs=registros.filter(r=>String(r.estado).includes('OC')||r.estado==='OT enviada'||r.estado==='Facturado'), net=rs.reduce((s,r)=>s+Number(r.precio||0),0); document.getElementById('view').innerHTML=`<h1>EDP / Cobros</h1><p>Servicios listos para cobrar o gestionar OC.</p><div class="grid4"><div class="card"><span>Servicios</span><b>${rs.length}</b></div><div class="card"><span>Neto</span><b>${money(net)}</b></div><div class="card"><span>IVA</span><b>${money(iva(net))}</b></div><div class="card"><span>Total</span><b>${money(total(net))}</b></div></div><div class="toolbar"><button class="btn primary" onclick="csv()">Exportar CSV</button></div>${table(rs)}`}
function csv(){let h=['ID','Fecha','Cliente','Area','Tipo','Personal','Neto','IVA','Total','Estado'];let out=[h,...registros.map(r=>[r.id,r.fecha,r.cliente,r.area,r.tipo,r.personal,r.precio,iva(r.precio),total(r.precio),r.estado])].map(x=>x.map(v=>'"'+String(v||'').replaceAll('"','""')+'"').join(',')).join('\n');let b=new Blob(['\uFEFF'+out],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='HNF_EDP_'+today()+'.csv';a.click()}
function control(){let alerts=[];registros.forEach(r=>{if(String(r.estado).includes('OC'))alerts.push('🔴 '+r.id+' '+r.cliente+': OC pendiente');if(r.precio&&!r.costo)alerts.push('⚠️ '+r.id+' '+r.cliente+': costo pendiente');if(!r.personal)alerts.push('🟠 '+r.id+' '+r.cliente+': sin responsable')});document.getElementById('view').innerHTML=`<h1>Control Gerencial</h1><p>Bloqueos reales antes de cerrar, facturar o enviar EDP.</p>${alerts.map(a=>`<div class="alert">${a}</div>`).join('')||'<div class="card">Sin alertas críticas.</div>'}`}
function jarvis(){document.getElementById('view').innerHTML=`<h1>Jarvis IA Local</h1><p>Pega texto de WhatsApp, foto transcrita, PDF copiado o Excel pegado.</p><div class="jarvis"><div><textarea id="jtxt" rows="12" placeholder="Ej: OT 2849 Tattersall instalación dispensadores Vitacura neto 45000 pendiente OC Emerson Silva"></textarea><button class="btn primary" onclick="previewJarvis()">Interpretar</button></div><div id="jprev" class="card">Esperando instrucción...</div></div>`}
function previewJarvis(){let r=parseText(val('jtxt'));document.getElementById('jprev').innerHTML=`<h2>Preview</h2><p><span class="badge ${r.area==='Clima'?'b-blue':'b-green'}">${ICON[r.area]} ${r.area}</span></p><p><b>Cliente:</b> ${r.cliente||'pendiente'}</p><p><b>Neto:</b> ${money(r.precio)}</p><p><b>Estado:</b> ${r.estado}</p><button class="btn primary" onclick='saveJarvis(${JSON.stringify(r).replaceAll("'","&apos;")})'>Guardar</button>`}
function saveJarvis(r){registros.push(r);save();go('Registro Diario')}
function del(id){if(confirm('Eliminar '+id+'?')){registros=registros.filter(r=>r.id!==id);save();render()}}
function go(v){view=v;q='';render()}
render();
</script>
</body>
</html>
