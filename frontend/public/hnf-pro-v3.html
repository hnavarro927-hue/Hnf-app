let registros=migrate(JSON.parse(localStorage.getItem(KEY)||'null')||seed),clientes=JSON.parse(localStorage.getItem(CK)||'null')||clients,view='Dashboard',q='',tempFiles=[];function migrate(arr){return arr.map(r=>{let n={...r,tiempo:r.tiempo||'',adjuntos:Array.isArray(r.adjuntos)?r.adjuntos:[]};if(n.area==='Obras Civiles / SSGG')n.personal='Emerson Silva';if(n.area==='Clima')n.personal='Andrés Vilches';if(n.area==='Lavado Vehículos'||/sixt|tattersall casa matriz|lavado/i.test(n.cliente+' '+n.sucursal+' '+n.tipo))n.personal='Andrés Celis';if(OFF.some(x=>String(n.personal).toLowerCase()===x.toLowerCase())){n.notas=(n.notas||'')+' · Responsable desvinculado, reasignar.';n.personal=''}return n})}function save(){localStorage.setItem(KEY,JSON.stringify(registros));localStorage.setItem(CK,JSON.stringify(clientes));localStorage.setItem(BK,JSON.stringify({fecha:new Date().toISOString(),registros,clientes}))}function classify(t){let s=t.toLowerCase();if(/lavado|sixt|rent a car/.test(s))return'Lavado Vehículos';if(/puma|clima|aire|btu|mantenci/.test(s))return'Clima';if(/granleasing|patente|rt|traslado|revisión técnica|revision tecnica/.test(s))return'Flota';return'Obras Civiles / SSGG'}function clientFor(s,a){return clientes.find(c=>s.includes(c.nombre.toLowerCase()))||clientes.find(c=>s.includes('puma')&&c.nombre.includes('Puma'))||clientes.find(c=>s.includes('sixt')&&c.nombre.includes('Sixt'))||clientes.find(c=>s.includes('vitacura')&&c.sucursal==='Vitacura')||clientes.find(c=>c.area===a)||{}}function ownerFor(a,s=''){if(a==='Obras Civiles / SSGG')return'Emerson Silva';if(a==='Lavado Vehículos')return'Andrés Celis';if(a==='Clima')return'Andrés Vilches';return''}function num(rx,t){let m=(t.match(rx)||[])[1];return m?Number(String(m).replaceAll('.','').replaceAll(',','')):0}function parse(t){let s=t.toLowerCase(),a=classify(t),c=clientFor(s,a),id=(t.match(/(?:OT|LAV|INF)[-\s]*(\d+)/i)||[])[1];return{id:id?(a==='Clima'?'INF-':a==='Lavado Vehículos'?'LAV-':'OT-')+id:(a==='Clima' >Ver / Editar ${esc(r.id)}</h1><p>Corrige responsable, costo, tiempo y estado antes de EDP.</p><div class="form on"><div class="formgrid"><label>Cliente<input id="e_cliente" value="${esc(r.cliente)}"></label><label>Área<select id="e_area">${options(r.area)}</select></label><label>Sucursal<input id="e_sucursal" value="${esc(r.sucursal)}"></label><label>Tipo<input id="e_tipo" value="${esc(r.tipo)}"></label><label>Responsable<select id="e_personal">${personOptions(r.personal)}</select></label><label>Tiempo<input id="e_tiempo" value="${esc(r.tiempo)}"></label><label>Neto<input id="e_precio" type="number" value="${Number(r.precio||0)}"></label><label>Costo<input id="e_costo" type="number" value="${Number(r.costo||0)}"></label><label>Estado<select id="e_estado"><option>${esc(r.estado)}</option><option>Solicitud recibida</option><option>En ejecución</option><option>Ejecutado - Pendiente OC</option><option>Pendiente OC</option><option>OT enviada</option><option>Listo EDP</option><option>Facturado</option><option>Cerrado</option></select></label><textarea id="e_notas" class="wide">${esc(r.notas)}</textarea></div><div class="actions"><button class="btn" onclick="go('Registro Diario')">Volver</button><button class="btn blue" onclick="autoAssign('${esc(r.id)}')">Auto asignar HNF</button><button class="btn primary" onclick="saveDetail('${esc(r.id)}')">Guardar cambios</button></div></div><h2>Jarvis piensa</h2>${brain(r).map(x=>`<div class="alert">${esc(x)}</div>`).join('')}`}function saveDetail(id){let r=registros.find(x=>x.id===id);Object.assign(r,{cliente:val('e_cliente'),area:val('e_area'),sucursal:val('e_sucursal'),tipo:val('e_tipo'),personal:val('e_personal'),tiempo:val('e_tiempo'),precio:Number(val('e_precio')),costo:Number(val('e_costo')),estado:val('e_estado'),notas:val('e_notas')});save();detail(id)}function autoAssign(id){let r=registros.find(x=>x.id===id);r.personal=ownerFor(r.area,(r.cliente+' '+r.sucursal+' '+r.tipo));save();detail(id)}function newForm(){let el=document.getElementById('form');el.classList.add('on');el.innerHTML=`<div class="formgrid"><input id="n_cliente" placeholder="Cliente"><select id="n_area">${options('Flota')}</select><input id="n_sucursal" placeholder="Sucursal / patente"><input id="n_tipo" placeholder="Tipo"><select id="n_personal">${personOptions('')}</select><input id="n_tiempo" placeholder="Tiempo"><input id="n_precio" type="number" placeholder="Neto"><input id="n_costo" type="number" placeholder="Costo"><select id="n_estado"><option>Solicitud recibida</option><option>En ejecución</option><option>Ejecutado - Pendiente OC</option><option>Pendiente OC</option><option>OT enviada</option></select><textarea id="n_notas" class="wide" placeholder="Notas"></textarea></div><div class="actions"><button class="btn primary" onclick="saveNew()">Guardar</button></div>`}function saveNew(){let a=val('n_area');registros.push({id:(a==='Clima'?'INF-':a==='Lavado Vehículos'?'LAV-':'OT-')+Date.now().toString().slice(-5),fecha:today(),cliente:val('n_cliente'),area:a,sucursal:val('n_sucursal'),tipo:val('n_tipo'),personal:val('n_personal')||ownerFor(a),tiempo:val('n_tiempo'),precio:Number(val('n_precio')),costo:Number(val('n_costo')),estado:val('n_estado'),notas:val('n_notas'),adjuntos:[]});save();render()}function edp(){let rs=registros.filter(r=>/OC|OT enviada|Listo EDP|Facturado/.test(r.estado)),net=rs.reduce((s,r)=>s+Number(r.precio||0),0);document.getElementById('view').innerHTML=`<h1>EDP / Cobros</h1><p>Solo avanzar con registros completos.</p><div class="grid5"><div class="card"><span>Servicios</span><b>${rs.length}</b></div><div class="card"><span>Neto</span><b>${money(net)}</b></div><div class="card"><span>IVA</span><b>${money(iva(net))}</b></div><div class="card"><span>Total</span><b>${money(total(net))}</b></div><div class="card"><span>Bloqueos</span><b>${rs.filter(r=>audit(r).length).length}</b></div></div><div class="actions" style="justify-content:flex-start"><button class="btn primary" onclick="csv()">Exportar CSV</button></div>${table(rs)}`}function csv(){let h=['ID','Fecha','Cliente','Area','Sucursal','Tipo','Responsable','Tiempo','Neto','IVA','Total','Costo','Margen','Estado','Faltantes'];let out=[h,...registros.map(r=>[r.id,r.fecha,r.cliente,r.area,r.sucursal,r.tipo,r.personal,r.tiempo,r.precio,iva(r.precio),total(r.precio),r.costo,pct(r.precio,r.costo)||'',r.estado,audit(r).join('|')])].map(x=>x.map(v=>'"'+String(v||'').replaceAll('"','""')+'"').join(',')).join('\n');let b=new Blob(['\uFEFF'+out],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='HNF_EDP_'+today()+'.csv';a.click()}function control(){let msgs=[];registros.forEach(r=>brain(r).forEach(x=>msgs.push([r.id,x])));document.getElementById('view').innerHTML=`<h1>Control HNF</h1><p>Reglas operativas activas y desvinculaciones consideradas.</p><div class="rules"><span>Obras Civiles → Emerson Silva</span><span>Lavado Tattersall Casa Matriz → Andrés Celis</span><span>Clima → Andrés Vilches</span><span>Bernabé Villegas y Yohonatan/Yohnatan Castillo desvinculados: no asignar.</span></div>${msgs.map(m=>`<div class="alert"><b>${esc(m[0])}</b> · ${esc(m[1])}</div>`).join('')}`}function jarvis(){document.getElementById('view').innerHTML=`<h1>🤖 Jarvis Cerebro</h1><p>No solo registra: evalúa, asigna, detecta riesgos y prepara mensaje operativo.</p><div class="brain"><textarea id="jtxt" rows="8" placeholder="Pega solicitud WhatsApp o instrucción"></textarea><div class="actions"><button class="btn blue" onclick="brainText()">Pensar</button><button class="btn primary" onclick="createFromBrain()">Crear registro</button></div><div id="jres" class="card">Esperando instrucción...</div></div>`}function brainText(){let r=parse(val('jtxt')),ideas=brain(r),msg=`Equipo, registro detectado: ${r.area} / ${r.cliente||'cliente pendiente'}. Responsable sugerido: ${r.personal||'pendiente'}. ${audit(r).length?'Faltan: '+audit(r).join(', '):'Datos completos para avanzar.'}`;document.getElementById('jres').innerHTML=`<h2>Decisión Jarvis</h2><p><span class="badge ${r.area==='Clima'?'blue':'green'}">${ICON[r.area]} ${esc(r.area)}</span></p>${ideas.map(x=>`<div class="alert">${esc(x)}</div>`).join('')}<h3>WhatsApp sugerido</h3><textarea rows="5">${esc(msg)}</textarea>`}function createFromBrain(){let r=parse(val('jtxt'));registros.push(r);save();go('Registro Diario')}function backup(){document.getElementById('view').innerHTML=`<h1>Backup</h1><p>Respaldo local JSON.</p><button class="btn primary" onclick="downloadBackup()">Descargar respaldo</button><label class="btn blue">Importar respaldo<input type="file" accept="application/json" style="display:none" onchange="importBackup(this.files[0])"></label>`}function downloadBackup(){let b=new Blob([JSON.stringify({fecha:new Date().toISOString(),registros,clientes},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='HNF_BACKUP_'+today()+'.json';a.click()}function importBackup(file){if(!file)return;let fr=new FileReader();fr.onload=()=>{let d=JSON.parse(fr.result);registros=migrate(d.registros||[]);clientes=d.clientes||clientes;save();render()};fr.readAsText(file)}function val(id){return document.getElementById(id)?.value||''}function drawer(){document.getElementById('drawer').classList.toggle('on')}function brainQuick(){let r=parse(val('qtxt'));document.getElementById('qres').innerHTML=brain(r).map(x=>`<div class="alert">${esc(x)}</div>`).join('')}function quickCreate(){registros.push(parse(val('qtxt')));save();drawer();render()}function go(v){view=v;q='';render()}save();render();</script></body></html>
